name: Sync not-echo-not-true.py

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy file
        run: |
          cp completions/nene.completions.bash data/data/com.termux/files/usr/bash-completion/nene.completions.bash
          cp man/nene.1 data/data/com.termux/files/usr/man/nene.1
          cp not-echo-not-true.py libexec/not-echo-not-true.py
          cp bin/nene data/data/com.termux/files/usr/bin/nene

      - name: Debug - Check Git Status
        run: git status

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add libexec/not-echo-not-true.py
          git add data/data/com.termux/files/usr/bash-completion/nene.completions.bash
          git add data/data/com.termux/files/usr/man/nene.1
          git add data/data/com.termux/files/usr/bin/nene
          git commit -m "Sync not-echo-not-true.py to libexec/not-echo-not-true.py" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref }}
          
